name: Build data & deploy

on:
  schedule:
    # Hourly, to catch new releases early. Idle runs cost nothing that matters: no data change ->
    # no commit, explanation cache hit -> no API-key calls; just a re-poll + redeploy (~1 min).
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write # prune this workflow's own old runs

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Install build deps
        run: composer install --no-interaction --no-progress
        working-directory: web/build

      - name: Run build tests (gate)
        run: vendor/bin/phpunit
        working-directory: web/build

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install web deps
        run: npm ci
        working-directory: web

      - name: Run web tests (gate)
        run: npm test
        working-directory: web

      - name: Generate data
        run: php build.php
        working-directory: web/build
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Validate generated data contract
        run: php validate.php
        working-directory: web/build

      # GITHUB_REPOSITORY (owner/repo) is guaranteed on every event; an empty repository name in
      # the event payload would otherwise yield base "//" and break every asset URL.
      - name: Build site
        run: PAGES_BASE="/${GITHUB_REPOSITORY#*/}/" npm run build
        working-directory: web

      # Stamp the DEPLOYED data (not the committed source) with a freshness heartbeat every run, so
      # the frontend can fail closed if the pipeline ever stops. generatedAt only moves on a real data
      # change, so it can't serve as the heartbeat; this writes only into the gitignored dist artifact.
      - name: Stamp deploy freshness (checkedAt)
        run: php stamp.php ../dist/data/typo3.json
        working-directory: web/build

      # Re-validate the ACTUAL artifact that gets deployed (validate above ran on the source, before
      # the stamp mutation), and require the heartbeat — the frontend fails open without it.
      - name: Re-validate the stamped deploy artifact
        run: php validate.php ../dist/data/typo3.json --require-checked-at
        working-directory: web/build

      - name: Commit refreshed data (persists the explanation cache) — only after validate + build pass
        run: |
          if [ -n "$(git status --porcelain web/public/data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add web/public/data
            git commit -m "chore(data): refresh TYPO3 release/advisory data"
            git pull --rebase # a human push during the run must not fail the deploy
            git push
          else
            echo "No data changes."
          fi

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist
      - id: deploy
        uses: actions/deploy-pages@v5

      # Hourly runs would otherwise bury the Actions list. Successful runs older than 48h carry no
      # information (the data lives in the repo); failures are NEVER pruned — they must stay visible.
      - name: Prune successful runs older than 48h
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cutoff="$(date -u -d '48 hours ago' +%FT%TZ)"
          gh api "repos/$GITHUB_REPOSITORY/actions/workflows/build-data.yml/runs?status=success&per_page=100" \
            --paginate --jq ".workflow_runs[] | select(.created_at < \"$cutoff\") | .id" \
            | while read -r run_id; do
                gh api -X DELETE "repos/$GITHUB_REPOSITORY/actions/runs/$run_id" \
                  && echo "pruned run $run_id" || echo "could not prune $run_id (continuing)"
              done
